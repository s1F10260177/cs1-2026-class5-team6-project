      <h2>マクドナルドとは</h2>
      <p>世界100ヵ国以上で展開されているハンバーガーチェーンです。Q(品質)、S(サービス)、 C(清潔さ)の上に成立するV(価値)を生み出すことに力を入れています。マクドナルドはそのお手頃な価格設定で、家族連れや学生など幅広い世代に親しまれています。</p>
      <p>マクドナルドの魅力</p>
      <ul>
        <li>手軽な価格</li>
        <li>提供スピード</li>
        <li>ハッピーセットのような子供を楽しませる要素の充実</li>
        <li>魅力的な期間限定メニュー</li>
      </ul>
